name: Android Build (Sara AI)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Prepare web assets stub
        working-directory: mobile
        run: |
          mkdir -p www
          cat > www/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="fr">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
              <title>Sara AI</title>
              <style>
                body { margin:0; background:#118c44; color:#fff; font-family:system-ui,sans-serif; height:100vh; display:flex; align-items:center; justify-content:center; }
                .S { font-size:25vh; font-weight:900; }
              </style>
            </head>
            <body><div class="S">S</div></body>
          </html>
          EOF

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Generate icons & splash from resources/
        working-directory: mobile
        run: |
          npx capacitor-assets generate --android \
            --assetPath resources \
            --iconBackgroundColor '#118c44' \
            --iconBackgroundColorDark '#118c44' \
            --splashBackgroundColor '#118c44' \
            --splashBackgroundColorDark '#118c44'

      - name: Sync Capacitor
        working-directory: mobile
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        working-directory: mobile/android/app/build/outputs/apk/debug
        run: mv app-debug.apk sara-ai-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sara-ai-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/sara-ai-debug.apk
          retention-days: 30
          if-no-files-found: error
